# /etc/nginx/sites-available/scrape.kitabe.org
# SCRAPER_HOST_PORT=18080 ise proxy_pass aynı kalır (compose varsayılanı).

server {
    listen 80;
    listen [::]:80;
    server_name scrape.kitabe.org;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# TLS (certbot sonrası) için 443 bloğunu kendi sertifikanızla ekleyin.
